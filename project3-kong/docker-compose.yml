version: "3.8"

services:
  # ── Kong API Gateway (DB-less mode) ─────────────────────────────────────────
  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./kong.yaml:/etc/kong/kong.yaml:ro
    ports:
      - "8000:8000"   # Proxy port — all API traffic goes here
      - "8001:8001"   # Admin API — check config, health
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    depends_on:
      - weather-service

  # ── Backend microservice ─────────────────────────────────────────────────────
  weather-service:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
